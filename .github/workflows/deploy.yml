name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Push to the Hugging Face space repository
          # Uses the HF_TOKEN secret for authentication
          git remote add hf https://aswinas608-cell:$HF_TOKEN@huggingface.co/spaces/aswinas608-cell/NETFLOW-AI
          git push hf main --force
