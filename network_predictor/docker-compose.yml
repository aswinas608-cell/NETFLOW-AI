version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - '8000:8000'
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - '3000:80'
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped
